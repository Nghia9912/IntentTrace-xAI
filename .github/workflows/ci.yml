name: IntentTrace-xAI CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Cache Hugging Face Transformers
      uses: actions/cache@v3
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-${{ hashFiles('**/semantic_engine.py', '**/hf_wrapper.py') }}
        restore-keys: |
          ${{ runner.os }}-hf-

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov flake8

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 core models tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 core models tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Test Suite with Coverage
      env:
        HF_HUB_DISABLE_TELEMETRY: "1"
        HF_HUB_OFFLINE: "0"
      run: |
        pytest tests/ --cov=core --cov=models --cov-report=xml